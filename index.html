<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>느린아이 색깔 익히기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --warm-700:#4A4035; --warm-800:#2E261D;
  --warm-400:#B8AD9E; --warm-500:#8C8070; --warm-600:#6B5F50;
  --border:#E8E2DA; --border-light:#F0ECE6;
  --blue:#6BADE8; --orange:#F0A050; --green:#5BC886; --red:#F07070;
  --bg:#F5F1EB;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;user-select:none;-webkit-tap-highlight-color:transparent;color:var(--warm-700);}
.hidden{display:none!important;}
.app{width:100%;max-width:480px;min-height:100dvh;background:#fff;padding:24px 20px;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;}
@media(min-width:768px){body{align-items:center;padding:32px;}.app{max-width:560px;min-height:auto;border-radius:32px;box-shadow:0 8px 48px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);padding:44px 40px;}}

/* ── Login View ── */
.login-view{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;width:100%;min-height:100dvh;padding:20px 20px 100px;}
.login-logo-area{text-align:center;margin-bottom:48px;}
.login-logo-area svg{display:block;margin:0 auto;}
.login-logo-area h1{font-size:clamp(1.8rem,6vw,2.25rem);font-weight:900;letter-spacing:-0.025em;margin-top:8px;white-space:nowrap;}
.login-subtitle{color:#B8AD9E;font-size:.9375rem;margin-top:4px;}

@keyframes floatBubble{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.login-trial{position:relative;background:#FFF8F0;border:1.5px solid #EDD080;border-radius:14px;padding:9px 16px;font-size:.78rem;color:#7B6545;font-weight:600;text-align:center;margin-bottom:24px;line-height:1.4;box-shadow:0 4px 14px rgba(220,160,50,.18);animation:floatBubble 2.8s ease-in-out infinite;align-self:center;}
.login-trial::before{content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top:8px solid #EDD080;border-bottom:0;}
.login-trial::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top:7px solid #FFF8F0;border-bottom:0;z-index:1;}
.login-buttons{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;border-radius:12px;font-size:.9375rem;font-weight:600;font-family:inherit;line-height:1.2;border:none;cursor:pointer;transition:transform .1s;}
.login-btn:active{transform:scale(.97);}
.login-btn svg{flex-shrink:0;}
.login-btn.kakao{background:#FEE500;color:#191919;}
.login-btn.naver{background:#03C75A;color:#FFFFFF;}
.login-btn.google{background:#FFFFFF;color:#444444;border:1.5px solid #DADCE0;}
.login-btn.facebook{background:#1877F2;color:#FFFFFF;}

/* ── Start View ── */
#start-view{width:100%;display:flex;flex-direction:column;align-items:center;}
.brand{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;position:relative;width:100%;}
.brand h1{font-size:1.6rem;font-weight:900;letter-spacing:-.025em;margin-top:8px;}
.brand-sub{font-size:.8rem;color:var(--warm-400);margin-top:6px;margin-bottom:0;font-weight:500;}
.share-btn{position:absolute;top:0;right:0;background:#fff;border:2px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--warm-500);}
.share-bubble{position:absolute;right:0;background:#FFF8F0;border:1.5px solid #EDD080;border-radius:12px;padding:8px 12px;font-size:.55rem;color:#7B6545;font-weight:600;box-shadow:0 4px 12px rgba(220,160,50,.18);z-index:20;animation:floatBubble 2.8s ease-in-out infinite;line-height:1.5;text-align:right;max-width:200px;}
.share-bubble::before{content:'';position:absolute;top:-8px;right:10px;border:4px solid transparent;border-bottom:7px solid #EDD080;border-top:0;}
.share-bubble::after{content:'';position:absolute;top:-6px;right:11px;border:3px solid transparent;border-bottom:6px solid #FFF8F0;border-top:0;z-index:1;}

/* Color Group Cards */
.mode-grid{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.mode-card{background:#fff;border:2px solid var(--border);border-radius:20px;padding:14px 16px 12px;width:100%;transition:border-color .15s,background .15s;cursor:pointer;}
.mode-card.selected{border-color:var(--blue);background:#EEF6FD;}
.mode-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.mode-preview-wrap{width:76px;height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;}
.group-dot{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(0,0,0,.1);}
.mode-info{flex:1;text-align:left;}
.mode-title{font-size:1rem;font-weight:700;color:var(--warm-700);margin-bottom:2px;}
.mode-desc{font-size:.72rem;color:var(--warm-400);}
.select-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:transparent;font-size:.9rem;}
.mode-card.selected .select-check{background:var(--blue);border-color:var(--blue);color:#fff;}

.mode-btns{display:flex;gap:8px;}
.mode-btn{flex:1;padding:10px 0;border:2px solid var(--border);border-radius:10px;background:#fff;font-family:inherit;font-size:.85rem;font-weight:700;color:var(--warm-600);cursor:pointer;transition:all .12s;text-align:center;}
.mode-btn:hover,.mode-btn:active{background:#EEF6FD;border-color:var(--blue);color:var(--blue);}

/* ── Settings ── */
.settings-section{width:100%;border-top:1.5px solid var(--border-light);padding-top:16px;margin-top:4px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.setting-label{font-size:.875rem;font-weight:600;color:var(--warm-700);}
.setting-desc{font-size:.75rem;color:var(--warm-400);margin-top:2px;}
.toggle-track{width:48px;height:28px;border-radius:99px;position:relative;background:#E0DAD0;border:none;cursor:pointer;flex-shrink:0;transition:background .2s;}
.toggle-track.on{background:#5BC886;}
.toggle-knob{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;box-shadow:0 1px 4px rgba(0,0,0,.12);transition:transform .2s;}
.toggle-track.on .toggle-knob{transform:translateX(20px);}
.impulse-mode-options{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:10px;}
.impulse-mode-btn{display:flex;flex-direction:column;align-items:center;padding:10px 8px;border-radius:14px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;font-family:inherit;}
.impulse-mode-btn.selected{border-color:#C4AA82;background:#FAF5EE;}
.impulse-mode-icon{font-size:1.2rem;margin-bottom:2px;}
.impulse-mode-label{font-size:.8rem;font-weight:700;color:var(--warm-700);}
.impulse-mode-desc{font-size:.65rem;color:var(--warm-400);margin-top:1px;}
.imp-sec-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.imp-sec{flex:0 0 calc((100% - 16px)/5);padding:8px 0;font-size:.7rem;font-weight:600;border-radius:10px;border:2px solid var(--border);background:#fff;color:#8C8070;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.imp-sec.active{border-color:#C4AA82;background:#FAF5EE;color:#7B6545;}
#impulse-details{display:none;}
.logout-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.75rem;font-weight:600;color:var(--warm-400);cursor:pointer;font-family:inherit;margin-top:20px;}
.logout-btn:hover{background:var(--bg);}

/* ── Play View ── */
#play-view{width:100%;display:flex;flex-direction:column;align-items:center;}
.play-header{display:flex;align-items:center;gap:12px;width:100%;margin-bottom:14px;}
.btn-home{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--warm-500);flex-shrink:0;padding:0;}
.play-middle{flex:1;display:flex;flex-direction:column;gap:4px;}
.play-progress-label{font-size:.8rem;font-weight:600;color:var(--warm-500);}
.play-progress-bar{width:100%;height:6px;background:var(--border-light);border-radius:3px;overflow:hidden;}
.play-progress-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .3s;}
.play-score{font-size:.85rem;font-weight:700;color:var(--green);flex-shrink:0;}
.game-container{background:#fff;border:2px solid var(--border);border-radius:20px;padding:20px 16px 16px;width:100%;display:flex;flex-direction:column;align-items:center;}
.question-prompt{font-size:1.3rem;font-weight:900;color:var(--warm-700);text-align:center;margin-bottom:20px;line-height:1.3;}

/* Color squares */
.color-squares-row{display:flex;gap:10px;justify-content:center;width:100%;margin-bottom:18px;}
.color-sq-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.color-sq{border-radius:16px;border:3px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.08);transition:border-color .2s,box-shadow .2s,transform .15s;flex-shrink:0;}
.color-sq.sq-active{border-color:var(--blue);box-shadow:0 0 0 4px rgba(107,173,232,.25),0 4px 16px rgba(0,0,0,.12);transform:scale(1.04);animation:sqPulse 1.5s ease-in-out infinite;}
.color-sq.sq-correct{border-color:#5BC886;box-shadow:0 0 0 3px rgba(91,200,134,.2);animation:none;}
.color-sq.sq-wrong{border-color:#F07070;box-shadow:0 0 0 3px rgba(240,112,112,.2);animation:none;}
.sq-name{font-size:.78rem;font-weight:700;min-height:18px;text-align:center;}
.sq-name.name-correct{color:#5BC886;}
.sq-name.name-wrong{color:#F07070;}
@keyframes sqPulse{0%,100%{box-shadow:0 0 0 4px rgba(107,173,232,.25),0 4px 16px rgba(0,0,0,.12)}50%{box-shadow:0 0 0 7px rgba(107,173,232,.18),0 4px 16px rgba(0,0,0,.12)}}

/* Choice buttons */
.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;}
.choice-btn{display:flex;align-items:center;justify-content:center;padding:16px 6px;border:2px solid var(--border);border-radius:14px;background:#FDFCFA;cursor:pointer;font-family:inherit;transition:border-color .12s,background .12s,transform .1s;}
.choice-btn:hover:not(:disabled){border-color:var(--blue);background:#EEF6FD;}
.choice-btn:active:not(:disabled){transform:scale(.96);}
.choice-btn:disabled{cursor:default;}
.choice-label{font-size:.95rem;font-weight:700;color:var(--warm-700);}
.choice-btn.ch-correct{border-color:#5BC886!important;background:#D4F5E0!important;}
.choice-btn.ch-wrong{border-color:#F07070!important;background:#FDE8E8!important;opacity:.6;}

.feedback{font-size:1rem;font-weight:700;text-align:center;padding:10px 0;min-height:42px;}
.feedback.correct{color:#5BC886;}
.feedback.wrong{color:#F07070;}
.btn-next-q{display:block;width:100%;max-width:360px;margin:8px auto 0;padding:14px 0;border-radius:16px;border:none;background:#4A4035;color:#fff;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(74,64,53,.15);transition:background .15s,transform .1s;}
.btn-next-q:active{transform:scale(.98);background:#2E261D;}
.delay-countdown{text-align:center;font-size:1.5rem;font-weight:900;color:#C4AA82;padding:14px 0;animation:pulse-count 1s ease infinite;}

/* Result View */
#result-view{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 0;}
.complete-overlay{position:relative;margin-top:40px;background:rgba(255,255,255,.95);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px;}
.complete-emoji{font-size:56px;}
.complete-msg{font-size:1.25rem;font-weight:900;color:#4A4035;}
.complete-sub{font-size:.85rem;color:#B8AD9E;}
.next-btn{margin-top:8px;padding:14px 36px;border:none;border-radius:12px;background:#6BADE8;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .12s;}
.next-btn:active{transform:scale(.96);}

/* Splash */
.splash-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:opacity .5s ease-out;}
.splash-overlay.fade-out{opacity:0;pointer-events:none;}
.splash-logo{animation:splashFloat 2.4s ease-in-out infinite;margin-bottom:24px;}
.splash-title{font-size:2rem;font-weight:900;letter-spacing:-.025em;margin-bottom:8px;}
.splash-subtitle{color:#B8B0A8;font-size:.9375rem;font-weight:500;}
@keyframes splashFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@media(max-width:380px){.splash-title{font-size:1.5rem}}
@media(min-width:768px){.splash-logo svg{width:160px;height:134px}.splash-title{font-size:2.5rem}.splash-subtitle{font-size:1.0625rem}}
@keyframes popIn{0%{transform:scale(.8);opacity:.5}45%{transform:scale(1.15)}65%{transform:scale(.92)}80%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pulse-count{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.7}}
</style>
</head>
<body>

  <div class="splash-logo">
    <svg viewBox="0 0 120 100" width="140" height="117" fill="none" xmlns="http://www.w3.org/2000/svg">

  </div>
  <h1 class="splash-title">
    <span style="color:#6BADE8;">느린</span><span style="color:#F0A050;">아이</span> <span style="color:#4A4035;">색깔 익히기</span>
  </h1>
  <p class="splash-subtitle">여러가지 색깔을 익혀보아요</p>
</div>

<div class="app">

  <!-- ══ 로그인 ══ -->
  <div id="login-view" class="login-view">
    <div class="login-logo-area">
      <svg viewBox="0 0 120 100" width="120" height="100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="30" cy="72" rx="10" ry="6" fill="#F2DC8C" stroke="#3A9B6A" stroke-width="2" transform="rotate(-20 30 72)"/>
        <ellipse cx="78" cy="76" rx="10" ry="6" fill="#F2DC8C" stroke="#3A9B6A" stroke-width="2" transform="rotate(15 78 76)"/>
        <ellipse cx="28" cy="54" rx="9" ry="5.5" fill="#F2DC8C" stroke="#3A9B6A" stroke-width="2" transform="rotate(-10 28 54)"/>
        <path d="M18 60 L10 55" stroke="#F2DC8C" stroke-width="4" stroke-linecap="round"/>
        <ellipse cx="55" cy="58" rx="35" ry="20" fill="#F5E6C8" stroke="#3A9B6A" stroke-width="2"/>
        <ellipse cx="52" cy="42" rx="32" ry="28" fill="#7EDCAA" stroke="#3A9B6A" stroke-width="2.5"/>
        <path d="M52 18 L42 32 L42 48 L52 58 L62 48 L62 32 Z" fill="none" stroke="#3A9B6A" stroke-width="1.3" opacity=".35"/>
        <line x1="42" y1="32" x2="24" y2="38" stroke="#3A9B6A" stroke-width="1.3" opacity=".35"/>
        <line x1="62" y1="32" x2="80" y2="38" stroke="#3A9B6A" stroke-width="1.3" opacity=".35"/>
        <line x1="42" y1="48" x2="26" y2="56" stroke="#3A9B6A" stroke-width="1.3" opacity=".35"/>
        <line x1="62" y1="48" x2="78" y2="56" stroke="#3A9B6A" stroke-width="1.3" opacity=".35"/>
        <ellipse cx="42" cy="26" rx="6" ry="4" fill="white" opacity=".35" transform="rotate(-15 42 26)"/>
        <ellipse cx="62" cy="36" rx="4" ry="3" fill="white" opacity=".2"/>
        <ellipse cx="92" cy="40" rx="17" ry="15" fill="#F5E6C8" stroke="#3A9B6A" stroke-width="2.5"/>
        <ellipse cx="82" cy="72" rx="10" ry="6" fill="#F2DC8C" stroke="#3A9B6A" stroke-width="2" transform="rotate(10 82 72)"/>
        <circle cx="99" cy="35" r="4" fill="white" stroke="#3A9B6A" stroke-width="1.5"/>

        <circle cx="100" cy="44" r="3.5" fill="#F0A050" opacity=".4"/>
        <path d="M94 46 Q98 50 103 46" fill="none" stroke="#3A9B6A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <h1><span style="color:#6BADE8;">느린</span><span style="color:#F0A050;">아이</span> <span style="color:#4A4035;">색깔 익히기</span></h1>
      <p class="login-subtitle">여러가지 색깔을 익혀보아요</p>
    </div>
    <p class="login-trial">가입하시고 하루 동안 모든 기능을<br>무료로 체험해보세요</p>
    <div class="login-buttons">
      <button class="login-btn kakao" onclick="socialLogin('kakao')">
        <svg width="20" height="20" viewBox="0 0 20 20"><path d="M10 1C4.477 1 0 4.477 0 8.667c0 2.7 1.753 5.072 4.393 6.413-.192.717-.694 2.6-.794 3.004-.124.497.182.49.383.356.158-.105 2.51-1.708 3.525-2.398.8.118 1.628.18 2.493.18 5.523 0 10-3.477 10-7.555C20 4.477 15.523 1 10 1z" fill="#191919"/></svg>
        카카오로 시작하기
      </button>
      <button class="login-btn naver" onclick="socialLogin('naver')">
        <svg width="20" height="20" viewBox="0 0 20 20"><path d="M13.57 10.684L6.066 0H0v20h6.43V9.316L13.934 20H20V0h-6.43v10.684z" fill="white"/></svg>
        네이버로 시작하기

<script>
/* ══ 색깔 데이터 ══ */
const COLOR_GROUPS = [
  { id:0, name:'빨간색 · 파란색 · 노란색', colors:[
    {name:'빨간색', hex:'#E53E3E'},
    {name:'파란색', hex:'#3182CE'},
    {name:'노란색', hex:'#ECC94B'},
  ]},
  { id:1, name:'검정색 · 흰색 · 회색', colors:[
    {name:'검정색', hex:'#1A202C'},
    {name:'흰색',   hex:'#F0F0F0'},
    {name:'회색',   hex:'#A0AEC0'},
  ]},
  { id:2, name:'주황색 · 초록색 · 보라색', colors:[
    {name:'주황색', hex:'#ED8936'},
    {name:'초록색', hex:'#38A169'},
    {name:'보라색', hex:'#805AD5'},
  ]},
  { id:3, name:'연두색 · 하늘색 · 분홍색', colors:[
    {name:'연두색', hex:'#68D391'},
    {name:'하늘색', hex:'#63B3ED'},
    {name:'분홍색', hex:'#F687B3'},
  ]},
  { id:4, name:'남색 · 자주색 · 갈색', colors:[
    {name:'남색',   hex:'#2B4C7E'},
    {name:'자주색', hex:'#97266D'},
    {name:'갈색',   hex:'#92400E'},
  ]},
];

/* ══ 상태 ══ */
let selectedGroups = new Set([0]);
let currentMode = 1;
let questions = [], currentQ = 0, score = 0, busy = false, delayTimer = null;
let currentAnswerIdx = 0;
let firstAttemptWrong = false;
let lastMode = 1;

let ttsEnabled = true, impulsePrevention = true, impulseMode = 'hide', impulseDelay = 5;

/* ══ 그룹 카드 렌더링 ══ */
function buildGroupCards() {
  const el = document.getElementById('group-cards');
  el.innerHTML = '';
  COLOR_GROUPS.forEach(g => {
    const card = document.createElement('div');
    card.className = 'mode-card' + (selectedGroups.has(g.id) ? ' selected' : '');
    card.id = 'group-card-' + g.id;
    card.onclick = () => toggleGroup(g.id);
    card.innerHTML = `
      <div class="mode-card-top">
        <div class="mode-preview-wrap">${g.colors.map(c =>
          `<div class="group-dot" style="background:${c.hex}"></div>`).join('')}</div>
        <div class="mode-info">
          <div class="mode-title">${g.name}</div>
          <div class="mode-desc">${g.colors.map(c=>c.name).join(', ')}</div>
        </div>
        <div class="select-check" id="check-${g.id}">${selectedGroups.has(g.id)?'✓':''}</div>
      </div>
    `;
    el.appendChild(card);
  });
}

function toggleGroup(id) {
  if (selectedGroups.has(id) && selectedGroups.size === 1) return;
  if (selectedGroups.has(id)) { selectedGroups.delete(id); }
  else { selectedGroups.add(id); }
  const card = document.getElementById('group-card-' + id);
  const check = document.getElementById('check-' + id);
  card.classList.toggle('selected', selectedGroups.has(id));
  check.textContent = selectedGroups.has(id) ? '✓' : '';
}

/* ══ 설정 ══ */
function saveSettings() {
  localStorage.setItem('slowmath_color_settings', JSON.stringify({ttsEnabled,impulsePrevention,impulseMode,impulseDelay}));
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('slowmath_color_settings'));
    if (!s) return;
    if (typeof s.ttsEnabled === 'boolean') ttsEnabled = s.ttsEnabled;
    if (typeof s.impulsePrevention === 'boolean') impulsePrevention = s.impulsePrevention;
    if (s.impulseMode === 'lock' || s.impulseMode === 'hide') impulseMode = s.impulseMode;
    if (typeof s.impulseDelay === 'number' && s.impulseDelay >= 1 && s.impulseDelay <= 10) impulseDelay = s.impulseDelay;
  } catch(e) {}
}
function applySettingsUI() {
  document.getElementById('tts-toggle').classList.toggle('on', ttsEnabled);
  document.getElementById('impulse-toggle').classList.toggle('on', impulsePrevention);
  document.getElementById('impulse-details').style.display = impulsePrevention ? 'block' : 'none';
  document.querySelectorAll('.impulse-mode-btn').forEach(b => b.classList.toggle('selected', b.dataset.mode === impulseMode));
  document.getElementById('impulse-delay-row').style.display = impulseMode === 'lock' ? '' : 'none';
  document.querySelectorAll('.imp-sec').forEach((b,i) => b.classList.toggle('active', i+1 === impulseDelay));
}
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  document.getElementById('tts-toggle').classList.toggle('on', ttsEnabled);
  if (!ttsEnabled && window.speechSynthesis) speechSynthesis.cancel();
  saveSettings();
}
function toggleImpulse() {
  impulsePrevention = !impulsePrevention;
  document.getElementById('impulse-toggle').classList.toggle('on', impulsePrevention);
  document.getElementById('impulse-details').style.display = impulsePrevention ? 'block' : 'none';
  saveSettings();
}
function setImpulseMode(mode) {
  impulseMode = mode;
  document.querySelectorAll('.impulse-mode-btn').forEach(b => b.classList.toggle('selected', b.dataset.mode === mode));
  document.getElementById('impulse-delay-row').style.display = mode === 'lock' ? '' : 'none';
  saveSettings();
}
function setImpulseDelay(sec) {
  impulseDelay = sec;
  document.querySelectorAll('.imp-sec').forEach((b,i) => b.classList.toggle('active', i+1 === sec));
  saveSettings();
}

/* ══ TTS ══ */
function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.9;
  setTimeout(() => speechSynthesis.speak(u), 50);
}

/* ══ 뷰 전환 ══ */
const VIEWS = ['login-view','start-view','play-view','result-view'];
function showView(id) {
  VIEWS.forEach(v => {
    const el = document.getElementById(v);
    if (!el) return;
    if (v === 'login-view') {
      el.style.display = v === id ? 'flex' : 'none';
    } else {
      el.classList.toggle('hidden', v !== id);
    }
  });
  const lb = document.querySelector('.logout-btn');
  if (lb) lb.style.display = id === 'start-view' && localStorage.getItem('slowmath_color_login') ? '' : 'none';
}

/* ══ 로그인 ══ */
function socialLogin(provider) {
  localStorage.setItem('slowmath_color_login', JSON.stringify({provider, time: Date.now()}));
  if (window.speechSynthesis) speechSynthesis.speak(new SpeechSynthesisUtterance(''));
  const _sp = sessionStorage.getItem('_sp_color');
  if (_sp) { sessionStorage.removeItem('_sp_color'); startGame(JSON.parse(_sp)); return; }
  document.querySelector('.logout-btn').style.display = '';
  showView('start-view');
}
function logout() {
  localStorage.removeItem('slowmath_color_login');
  showView('login-view');
}
function goHome() {
  if (delayTimer) { clearInterval(delayTimer); delayTimer = null; }
  busy = false;
  showView('start-view');
}

/* ══ 공유 ══ */
function shareApp() {
  var SHARE_KEY = 'slowmath_color_share_days';
  var MAX_DAYS = 5;
  var bubble = document.getElementById('share-bubble');
  function onShared() {
    var days = parseInt(localStorage.getItem(SHARE_KEY) || '0');
    if (days < MAX_DAYS) { days = days + 1; localStorage.setItem(SHARE_KEY, days); }
    if (bubble && days >= MAX_DAYS) { bubble.style.display = 'none'; }
    var shareToast = document.getElementById('share-toast');
    if (shareToast) {
      shareToast.textContent = '하루 무료 이용권이 지급되었습니다!';
      shareToast.style.opacity = '1';
      clearTimeout(shareToast._t);
      shareToast._t = setTimeout(function() { shareToast.style.opacity = '0'; }, 3000);
    }
  }
  var title = document.title, url = location.href;
  if (navigator.share) {
    navigator.share({title, url}).then(onShared).catch(function(){});
  } else {
    if (navigator.clipboard) navigator.clipboard.writeText(url);
    alert('링크가 복사되었어요!');
    onShared();
  }
}
document.addEventListener('DOMContentLoaded', function() {
  var days = parseInt(localStorage.getItem('slowmath_color_share_days') || '0');
  if (days >= 5) { var b = document.getElementById('share-bubble'); if (b) b.style.display = 'none'; }
});

/* ══ 문제 생성 ══ */
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function getAvailableColors() {
  const cols = [];
  selectedGroups.forEach(id => {
    COLOR_GROUPS[id].colors.forEach(c => cols.push({...c, groupId: id}));
  });
  return cols;
}

function generateQuestion(n) {
  const pool = getAvailableColors();
  const colors = Array.from({length: n}, () => pick(pool));
  const prompt = n === 1 ? '이 색깔은 무엇인가요?' : `순서대로 맞춰보세요! (1 / ${n})`;
  return { colors, answerIdx: 0, results: Array(n).fill(null), prompt, n };
}

function generateQuestions(n, count=10) {
  return Array.from({length: count}, () => generateQuestion(n));
}

/* ══ 게임 시작 ══ */
function startGame(n) {
  if (!localStorage.getItem('slowmath_color_login')) {
    sessionStorage.setItem('_sp_color', JSON.stringify(n));
    showView('login-view'); return;
  }
  lastMode = n;
  questions = generateQuestions(n);
  currentQ = 0; score = 0;
  document.getElementById('play-score').textContent = '0점';
  showView('play-view');
  loadQuestion();
}

function replayGame() { startGame(lastMode); }

/* ══ 문제 로드 ══ */
function onNextQ() {
  document.getElementById('next-q-btn').classList.add('hidden');
  loadQuestion();
}

function loadQuestion() {
  document.getElementById('next-q-btn').classList.add('hidden');
  if (currentQ >= questions.length) { showResult(); return; }

  busy = false;
  firstAttemptWrong = false;
  currentAnswerIdx = 0;

  const q = questions[currentQ];
  document.getElementById('q-label').textContent = (currentQ+1) + ' / ' + questions.length;
  document.getElementById('progress-fill').style.width = (currentQ/questions.length*100) + '%';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('question-prompt').textContent = q.colors.length === 1
    ? '이 색깔은 무엇인가요?'
    : `순서대로 맞춰보세요! (1 / ${q.colors.length})`;

  renderSquares(q);
  renderChoices(q);

  speak(q.colors.length === 1 ? '이 색깔은 무엇인가요?' : '순서대로 맞춰보세요');

  const impulseArea = document.getElementById('impulse-area');
  impulseArea.innerHTML = '';

  if (impulsePrevention) {
    applyImpulse(impulseArea);
  }
}

function applyImpulse(impulseArea) {
  const grid = document.getElementById('choice-grid');
  if (impulseMode === 'hide') {
    grid.style.visibility = 'hidden';
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    const revealBtn = document.createElement('button');
    revealBtn.className = 'reveal-btn';
    revealBtn.textContent = '보기 확인';
    revealBtn.onclick = () => {
      grid.style.visibility = 'visible';
      document.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
      revealBtn.remove();
    };
    impulseArea.appendChild(revealBtn);
  } else {
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    let remaining = impulseDelay;
    const cd = document.createElement('div');
    cd.className = 'delay-countdown';
    cd.textContent = remaining;
    impulseArea.appendChild(cd);
    delayTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(delayTimer); delayTimer = null;
        cd.remove();
        document.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
      } else { cd.textContent = remaining; }
    }, 1000);
  }
}

/* ══ 사각형 렌더링 ══ */
function sqSize(n) { return n === 1 ? 140 : n === 2 ? 115 : 90; }

function renderSquares(q) {
  const size = sqSize(q.colors.length);
  const row = document.getElementById('color-squares-row');
  row.innerHTML = '';
  q.colors.forEach((c, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'color-sq-wrap';
    const sq = document.createElement('div');
    sq.className = 'color-sq' + (i === 0 ? ' sq-active' : '');
    sq.id = 'sq-' + i;
    sq.style.cssText = `width:${size}px;height:${size}px;background:${c.hex};`;
    const lbl = document.createElement('div');
    lbl.className = 'sq-name';
    lbl.id = 'sq-name-' + i;
    wrap.appendChild(sq);
    wrap.appendChild(lbl);
    row.appendChild(wrap);
  });
}

/* ══ 선택지 렌더링 ══ */
function renderChoices(q) {
  const current = q.colors[currentAnswerIdx];
  const group = COLOR_GROUPS[current.groupId];
  const grid = document.getElementById('choice-grid');
  grid.innerHTML = '';
  group.colors.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${ch.name}</span>`;
    btn.onclick = () => pickAnswer(ch.name, q);
    grid.appendChild(btn);
  });
}

/* ══ 답 선택 ══ */
function pickAnswer(chosen, q) {
  if (busy) return;
  if (delayTimer) { clearInterval(delayTimer); delayTimer = null; document.getElementById('impulse-area').innerHTML = ''; }
  document.getElementById('impulse-area').innerHTML = '';
  document.getElementById('choice-grid').style.visibility = 'visible';

  const current = q.colors[currentAnswerIdx];
  const correct = current.name;
  const isOk = chosen === correct;
  const fb = document.getElementById('feedback');

  // Style choice buttons
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    const lbl = b.querySelector('.choice-label').textContent;
    if (lbl === chosen && !isOk) b.classList.add('ch-wrong');
    if (lbl === correct) b.classList.add('ch-correct');
  });

  // Update square
  const sq = document.getElementById('sq-' + currentAnswerIdx);
  const sqName = document.getElementById('sq-name-' + currentAnswerIdx);
  sq.classList.remove('sq-active');
  sq.classList.add(isOk ? 'sq-correct' : 'sq-wrong');
  sqName.textContent = (isOk ? '✓ ' : '✗ ') + correct;
  sqName.className = 'sq-name ' + (isOk ? 'name-correct' : 'name-wrong');

  if (isOk) {
    busy = true;
    if (!firstAttemptWrong) {
      score++;
      document.getElementById('play-score').textContent = score + '점';
    }
    fb.textContent = '정답!';
    fb.className = 'feedback correct';
    speak('정답!');
    q.results[currentAnswerIdx] = true;
    currentAnswerIdx++;
    if (currentAnswerIdx < q.colors.length) {
      // Move to next square after delay
      setTimeout(() => {
        busy = false;
        firstAttemptWrong = false;
        document.getElementById('question-prompt').textContent =
          `순서대로 맞춰보세요! (${currentAnswerIdx+1} / ${q.colors.length})`;
        fb.textContent = '';
        fb.className = 'feedback';
        document.getElementById('sq-' + currentAnswerIdx).classList.add('sq-active');
        renderChoices(q);
        if (impulsePrevention) {
          applyImpulse(document.getElementById('impulse-area'));
        }
      }, 900);
    } else {
      // All answered
      currentQ++;
      document.getElementById('next-q-btn').classList.remove('hidden');
    }
  } else {
    firstAttemptWrong = true;
    q.results[currentAnswerIdx] = false;
    fb.textContent = '다시 골라보세요';
    fb.className = 'feedback wrong';
    speak('다시 골라보세요');
    // Re-enable all except wrong
    setTimeout(() => {
      document.querySelectorAll('.choice-btn').forEach(b => {
        b.classList.remove('ch-wrong','ch-correct');
        b.disabled = false;
      });
      sq.classList.remove('sq-wrong');
      sq.classList.add('sq-active');
      sqName.textContent = '';
      sqName.className = 'sq-name';
      fb.textContent = '';
      fb.className = 'feedback';
    }, 900);
  }
}

/* ══ 결과 ══ */
function showResult() {
  showView('result-view');
  const total = questions.length;
  document.getElementById('result-emoji').textContent = score === total ? '🏆' : '👏';
  document.getElementById('result-msg').textContent = total + '문제 완료!';
  document.getElementById('result-detail').textContent = total + '문제 중 ' + score + '개 정답';
}

/* ══ 초기화 ══ */
(function init() {
  loadSettings();
  applySettingsUI();
  buildGroupCards();
  if (localStorage.getItem('slowmath_color_login')) {
    showView('start-view');
  } else {
    showView('login-view');
  }
  if (window.speechSynthesis) {
    speechSynthesis.getVoices();
    if (speechSynthesis.onvoiceschanged !== undefined)
      speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }
})();

setTimeout(function() {
  const splash = document.getElementById('splash');
  if (splash) { splash.classList.add('fade-out'); setTimeout(() => splash.remove(), 500); }
}, 3000);
</script>
